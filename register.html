<!DOCTYPE html>
<html lang="en" dir="ltr" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Create your InkCraft account — start your ghostwriting or book editing project today." />
  <title>Register | InkCraft Ghostwriting & Book Editing</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <script src="tailwind-config.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css" />
  <style>
    .auth-bg {
      position: fixed;
      inset: 0;
      background: url('https://images.unsplash.com/photo-1521737604893-d14cc237f11d?w=1920&h=1200&fit=crop') center/cover no-repeat;
      z-index: 0;
    }
    .auth-overlay {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, rgba(109,40,217,0.75) 0%, rgba(15,23,42,0.85) 100%);
      z-index: 1;
      transition: background 0.4s ease;
    }
    .dark .auth-overlay {
      background: linear-gradient(135deg, #0F172A 0%, #1E293B 100%);
    }
    :root:not(.dark) .auth-overlay {
      background: linear-gradient(135deg, #F8FAFC 0%, #E2E8F0 100%);
    }
    .auth-content {
      position: relative;
      z-index: 10;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }
    .auth-card {
      width: 100%;
      max-width: 480px;
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(32px);
      -webkit-backdrop-filter: blur(32px);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 1.5rem;
      padding: 2.5rem;
      box-shadow: 0 32px 80px rgba(0,0,0,0.40);
      position: relative;
      transition: all 0.3s ease;
    }
    .dark .auth-card {
      background: rgba(30, 41, 59, 0.7);
      border-color: rgba(255, 255, 255, 0.1);
    }
    :root:not(.dark) .auth-card {
      background: rgba(255, 255, 255, 0.9);
      border-color: rgba(109, 40, 217, 0.1);
      box-shadow: 0 20px 40px rgba(15, 23, 42, 0.1);
    }
    .auth-input {
      width: 100%;
      padding: 0.875rem 1rem 0.875rem 2.75rem;
      background: rgba(255,255,255,0.08);
      border: 1.5px solid rgba(255,255,255,0.20);
      border-radius: 0.75rem;
      color: var(--color-text);
      font-family: var(--font-body);
      font-size: 0.9375rem;
      transition: all 0.2s ease;
      outline: none;
    }
    :root:not(.dark) .auth-input {
      background: #FFFFFF;
      border-color: #E2E8F0;
    }
    .auth-input::placeholder { color: rgba(156, 163, 175, 0.6); }
    .auth-input:focus { border-color: var(--color-accent); background: rgba(255,255,255,0.12); box-shadow: 0 0 0 3px rgba(109,40,217,0.20); }
    .auth-label { color: var(--color-text); font-size: 0.875rem; font-weight: 600; margin-bottom: 0.5rem; display: block; opacity: 0.9; }
    .auth-controls { position: absolute; top: 1rem; inset-inline-end: 1rem; z-index: 20; display: flex; gap: 0.5rem; }
    .auth-ctrl-btn { width: 2.25rem; height: 2.25rem; border-radius: 0.5rem; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); color: var(--color-text); cursor: pointer; transition: all 0.2s ease; backdrop-filter: blur(8px); font-size: 0.875rem; }
    .auth-ctrl-btn:hover { background: rgba(109,40,217,0.40); border-color: rgba(109,40,217,0.50); }
    .strength-bar { height: 4px; border-radius: 9999px; transition: all 0.3s ease; }
  </style>
</head>
<body class="font-body">
  <div class="auth-bg"></div>
  <div class="auth-overlay"></div>

  <div class="auth-content">
    <div class="auth-card">
      <div class="auth-controls">
        <button class="rtl-toggle-btn auth-ctrl-btn" title="Toggle RTL/LTR"><i class="fas fa-globe rtl-icon"></i></button>
        <button class="theme-toggle-btn auth-ctrl-btn" title="Toggle Theme"><i class="fas fa-moon theme-icon" id="theme-icon"></i></button>
      </div>
      <!-- Logo -->
      <div class="text-center mb-6">
        <a href="index.html" class="inline-flex items-center gap-2 mb-3">
          <div class="logo-icon-box"><i class="fas fa-feather-alt"></i></div>
          <span class="font-heading font-bold text-2xl logo-text" >InkCraft</span>
        </a>
        <h1 class="font-heading font-bold text-2xl logo-text mb-1" >Start Your Story</h1>
        <p style="color:var(--color-text-muted);font-size:0.9375rem;">Create your free account — no card required</p>
      </div>

      <!-- Social Signup -->
      <div class="grid grid-cols-2 gap-3 mb-5">
        <button onclick="GBS.toast('info','Google Sign-Up','Redirecting to Google...')" class="flex items-center justify-center gap-2 py-2.5 rounded-xl text-sm font-semibold" style="background:rgba(109,40,217,0.05);border:1px solid var(--color-border);color:var(--color-text);">
          <i class="fab fa-google"></i> Google
        </button>
        <button onclick="GBS.toast('info','LinkedIn Sign-Up','Redirecting to LinkedIn...')" class="flex items-center justify-center gap-2 py-2.5 rounded-xl text-sm font-semibold" style="background:rgba(109,40,217,0.05);border:1px solid var(--color-border);color:var(--color-text);">
          <i class="fab fa-linkedin-in"></i> LinkedIn
        </button>
      </div>
      <div class="flex items-center gap-3 mb-5">
        <div class="flex-1 h-px" style="background:rgba(255,255,255,0.15);"></div>
        <span class="text-xs font-medium" style="color:rgba(255,255,255,0.45);">or register with email</span>
        <div class="flex-1 h-px" style="background:rgba(255,255,255,0.15);"></div>
      </div>

      <!-- Register Form -->
      <form data-mock data-mock-type="success" data-mock-title="Account Created!" data-mock-message="Welcome to InkCraft! Check your email to verify your account." class="space-y-4">
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="auth-label">First Name</label>
            <div class="relative">
              <i class="fas fa-user absolute left-3.5 top-1/2 -translate-y-1/2" style="color:rgba(255,255,255,0.40);font-size:0.8rem;"></i>
              <input type="text" class="auth-input" placeholder="John" required />
            </div>
          </div>
          <div>
            <label class="auth-label">Last Name</label>
            <div class="relative">
              <i class="fas fa-user absolute left-3.5 top-1/2 -translate-y-1/2" style="color:rgba(255,255,255,0.40);font-size:0.8rem;"></i>
              <input type="text" class="auth-input" placeholder="Doe" required />
            </div>
          </div>
        </div>
        <div>
          <label class="auth-label">Email Address</label>
          <div class="relative">
            <i class="fas fa-envelope absolute left-3.5 top-1/2 -translate-y-1/2" style="color:rgba(255,255,255,0.40);font-size:0.875rem;"></i>
            <input type="email" class="auth-input" placeholder="your@email.com" required />
          </div>
        </div>
        <div>
          <label class="auth-label">Password</label>
          <div class="relative">
            <i class="fas fa-lock absolute left-3.5 top-1/2 -translate-y-1/2" style="color:rgba(255,255,255,0.40);font-size:0.875rem;"></i>
            <input type="password" id="reg-pwd" class="auth-input" placeholder="Min. 8 characters" required oninput="checkStrength(this.value)" style="padding-right:3rem;" />
            <button type="button" onclick="togglePwd('reg-pwd','rpw-eye')" class="absolute right-3.5 top-1/2 -translate-y-1/2" style="background:none;border:none;cursor:pointer;color:rgba(255,255,255,0.40);">
              <i class="fas fa-eye" id="rpw-eye"></i>
            </button>
          </div>
          <div class="flex gap-1.5 mt-2" id="strength-bars">
            <div class="strength-bar flex-1" id="sb1" style="background:rgba(255,255,255,0.08);"></div>
            <div class="strength-bar flex-1" id="sb2" style="background:rgba(255,255,255,0.08);"></div>
            <div class="strength-bar flex-1" id="sb3" style="background:rgba(255,255,255,0.08);"></div>
            <div class="strength-bar flex-1" id="sb4" style="background:rgba(255,255,255,0.08);"></div>
          </div>
          <p class="text-xs mt-1" id="strength-label" style="color:rgba(255,255,255,0.45);">Enter password</p>
        </div>
        <div>
          <label class="auth-label">I am primarily looking to...</label>
          <select class="auth-input" style="padding-left:1rem;">
            <option style="color:#0F172A;">Get my book ghostwritten</option>
            <option style="color:#0F172A;">Have my manuscript edited</option>
            <option style="color:#0F172A;">Self-publish my book</option>
            <option style="color:#0F172A;">Write a book proposal</option>
            <option style="color:#0F172A;">I'm exploring options</option>
          </select>
        </div>
        <div class="flex items-start gap-2">
          <input type="checkbox" id="agree-terms" class="w-4 h-4 mt-0.5 rounded accent-purple-600" required />
          <label for="agree-terms" style="color:rgba(255,255,255,0.65);font-size:0.8125rem;cursor:pointer;line-height:1.5;">I agree to InkCraft's <a href="#" style="color:#A78BFA;">Terms of Service</a> and <a href="#" style="color:#A78BFA;">Privacy Policy</a>, including our NDA template for all projects.</label>
        </div>
        <button type="submit" class="btn-primary w-full justify-center" style="padding:0.875rem;font-size:1rem;border-radius:0.75rem;">
          <i class="fas fa-user-plus"></i> Create Free Account
        </button>
      </form>

      <p class="text-center mt-5 text-sm" style="color:rgba(255,255,255,0.55);">
        Already have an account? <a href="login.html" class="font-semibold" style="color:#A78BFA;">Sign in →</a>
      </p>
    </div>
  </div>

  <script src="main.js"></script>
  <script>
    function togglePwd(inputId, iconId) {
      const input = document.getElementById(inputId);
      const icon = document.getElementById(iconId);
      if (input.type === 'password') { input.type = 'text'; icon.className = 'fas fa-eye-slash'; }
      else { input.type = 'password'; icon.className = 'fas fa-eye'; }
    }
    function checkStrength(pwd) {
      let score = 0;
      if (pwd.length >= 8) score++;
      if (/[A-Z]/.test(pwd)) score++;
      if (/[0-9]/.test(pwd)) score++;
      if (/[^A-Za-z0-9]/.test(pwd)) score++;
      const colors = ['#DC2626','#D97706','#2563EB','#059669'];
      const labels = ['Weak','Fair','Good','Strong'];
      for (let i = 1; i <= 4; i++) {
        const bar = document.getElementById('sb' + i);
        bar.style.background = i <= score ? colors[score - 1] : 'rgba(255,255,255,0.08)';
      }
      const label = document.getElementById('strength-label');
      if (score > 0) { label.textContent = labels[score - 1] + ' password'; label.style.color = colors[score - 1]; }
      else { label.textContent = 'Enter password'; label.style.color = 'rgba(255,255,255,0.45)'; }
    }
  </script>
</body>
</html>
